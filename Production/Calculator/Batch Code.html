<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الأرقام التشغيلية (Batch Number Generator)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .results {
            margin-top: 30px;
        }

        .batch-card {
            background: #f9f9f9;
            border-right: 5px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .batch-label {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .batch-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            color: #e67e22;
            font-weight: bold;
        }

        .copy-btn {
            background: #ecf0f1;
            border: 1px solid #bdc3c7;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .copy-btn:hover { background: #dcdde1; }
    </style>
</head>
<body>

<div class="container">
    <h2>مولد الباتش نمبر الاحترافي</h2>
    
    <div class="form-group">
        <label>تاريخ الإنتاج:</label>
        <input type="date" id="prodDate" value="">
    </div>

    <div class="form-group">
        <label>رمز المصنع / الخط (مثال: MSA):</label>
        <input type="text" id="factoryCode" placeholder="مثلاً: MSA" maxlength="3">
    </div>

    <div class="form-group">
        <label>رقم الوردية / التسلسل (مثال: 01):</label>
        <input type="number" id="shift" placeholder="01" min="1">
    </div>

    <div class="form-group">
        <label>كود المنتج (مثال: PX):</label>
        <input type="text" id="productCode" placeholder="PX">
    </div>

    <button onclick="generateBatches()">إنشاء الأرقام التشغيلية</button>

    <div class="results" id="resultsArea" style="display:none;">
        <h3>النتائج المقترحة:</h3>
        
        <div class="batch-card">
            <div>
                <span class="batch-label">1. الصيغة الرقمية المباشرة (Date-Based):</span><br>
                <span class="batch-value" id="resDirect"></span>
            </div>
            <button class="copy-btn" onclick="copyText('resDirect')">نسخ</button>
        </div>

        <div class="batch-card">
            <div>
                <span class="batch-label">2. صيغة التاريخ اليولياني (Julian Date):</span><br>
                <span class="batch-value" id="resJulian"></span>
            </div>
            <button class="copy-btn" onclick="copyText('resJulian')">نسخ</button>
        </div>

        <div class="batch-card">
            <div>
                <span class="batch-label">3. الصيغة الأبجدية الرقمية (Alpha-Numeric):</span><br>
                <span class="batch-value" id="resAlpha"></span>
            </div>
            <button class="copy-btn" onclick="copyText('resAlpha')">نسخ</button>
        </div>

        <div class="batch-card">
            <div>
                <span class="batch-label">4. نظام GS1 العالمي:</span><br>
                <span class="batch-value" id="resGS1"></span>
            </div>
            <button class="copy-btn" onclick="copyText('resGS1')">نسخ</button>
        </div>
    </div>
</div>

<script>
    // تعيين تاريخ اليوم كقيمة افتراضية
    document.getElementById('prodDate').valueAsDate = new Date();

    function generateBatches() {
        const dateInput = new Date(document.getElementById('prodDate').value);
        const factory = document.getElementById('factoryCode').value.toUpperCase() || "F1";
        const shift = document.getElementById('shift').value.padStart(2, '0') || "01";
        const pCode = document.getElementById('productCode').value.toUpperCase() || "XX";

        if (isNaN(dateInput)) {
            alert("يرجى اختيار تاريخ صحيح");
            return;
        }

        const year = dateInput.getFullYear();
        const shortYear = year.toString().slice(-2);
        const month = (dateInput.getMonth() + 1).toString().padStart(2, '0');
        const day = dateInput.getDate().toString().padStart(2, '0');

        // 1. Direct Date
        document.getElementById('resDirect').innerText = `${year}${month}${day}${factory}${shift}`;

        // 2. Julian Date Calculation
        const start = new Date(dateInput.getFullYear(), 0, 0);
        const diff = dateInput - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay).toString().padStart(3, '0');
        document.getElementById('resJulian').innerText = `${shortYear}${dayOfYear}-${pCode}`;

        // 3. Alpha-Numeric (A=Jan, B=Feb...)
        const monthsAlpha = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
        const monthChar = monthsAlpha[dateInput.getMonth()];
        document.getElementById('resAlpha').innerText = `${monthChar}${shortYear}-${factory}-${shift}`;

        // 4. GS1 Standard
        document.getElementById('resGS1').innerText = `(10)${shortYear}${month}${day}${shift}`;

        // إظهار منطقة النتائج
        document.getElementById('resultsArea').style.display = 'block';
    }

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("تم النسخ: " + text);
        });
    }
</script>

</body>
</html>
